name: turnos-micros

services:
  ###### AGENDA ######
  turnos_ms_agenda:
    build:
      context: .
      dockerfile: ./agenda/Dockerfile.production
    image: ${REGISTRY:-local}/turnos-ms-agenda:${TAG:-latest}
    container_name: turnos_ms_agenda
    restart: always
    env_file:
      - ${APP_ENV_FILE_MICROS:-../.env}
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=agenda
      - DB_NAME_CLIENTES=turnos
      - TZ=America/Argentina/Buenos_Aires
    networks:
      - net-shared
  ###### CLINICA ######
  turnos_ms_clinica:
    build:
      context: .
      dockerfile: ./clinica/Dockerfile.production
    image: ${REGISTRY:-local}/turnos-ms-clinica:${TAG:-latest}
    container_name: turnos_ms_clinica
