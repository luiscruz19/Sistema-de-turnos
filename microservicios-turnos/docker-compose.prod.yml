      - DB_NAME_CLIENTES=turnos
      - TZ=America/Argentina/Buenos_Aires
    networks:
      - net-shared
  ###### PAGOS ######
  turnos_ms_pagos:
    build:
      context: .
      dockerfile: ./pagos/Dockerfile.production
    image: ${REGISTRY:-local}/turnos-ms-pagos:${TAG:-latest}
    container_name: turnos_ms_pagos
    restart: always
    env_file:
      - ${APP_ENV_FILE_MICROS:-../.env}
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=pagos
      - DB_NAME_CLIENTES=turnos
      - TZ=America/Argentina/Buenos_Aires
    networks:
      - net-shared
  ###### USUARIOS ######
  turnos_ms_usuarios:
    build:
      context: .
      dockerfile: ./usuarios/Dockerfile.production
