      - net-shared
  ###### WIDGET ######
  turnos_ms_widget:
    build:
      context: .
      dockerfile: ./widget/Dockerfile.production
    image: ${REGISTRY:-local}/turnos-ms-widget:${TAG:-latest}
    container_name: turnos_ms_widget
    restart: always
    env_file:
      - ${APP_ENV_FILE_MICROS:-../.env}
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=widget
      - DB_NAME_CLIENTES=turnos
      - TZ=America/Argentina/Buenos_Aires
