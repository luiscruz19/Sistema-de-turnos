    environment:
      - NODE_ENV=production
      - SERVICE_NAME=clinica
      - DB_NAME_CLIENTES=turnos
      - TZ=America/Argentina/Buenos_Aires
    networks:
      - net-shared
  ###### INTEGRACIONES ######
