# Infraestructura compartida del proyecto Turnos.
# Levanta primero esto (crea la red net-shared) y luego docker-compose.yml.
#   docker compose -f docker-compose.infra.yml up -d
services:
  ###### MySQL ######
  mysql:
    image: mysql:8.0
    container_name: turnos_mysql
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      TZ: America/Argentina/Buenos_Aires
    # Acceso interno por net-shared. Para conectar un cliente externo, descomentar:
    # ports:
    #   - "${DB_PORT_HOST:-3308}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${DB_ROOT_PASSWORD:-secret}",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - net-shared

  ###### Traefik (reverse proxy) ######
  # traefik:
  #   image: traefik:v3.1
  #   container_name: turnos_traefik
  #   restart: always
  #   command:
  #     - "--providers.docker=true"
  #     - "--providers.docker.exposedbydefault=false"
  #     - "--providers.docker.network=net-shared"
  #     - "--entrypoints.web.address=:80"
  #     - "--api.dashboard=true"
  #     - "--api.insecure=true"
  #   ports:
  #     - "${HTTP_PORT:-80}:80"
  #     - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   networks:
  #     - net-shared

  ###### MinIO (almacenamiento S3 para adjuntos clínicos) ######
  minio:
    image: minio/minio:latest
    container_name: turnos_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    # Acceso interno por net-shared (el servicio storage lo usa). Para abrir la consola web, descomentar:
    # ports:
    #   - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - net-shared

  ###### MinIO init: crea el bucket ######
  minio-init:
    image: minio/mc:latest
    container_name: turnos_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin}; do echo 'esperando minio...'; sleep 2; done;
      mc mb -p local/${MINIO_BUCKET_NAME:-turnos} || true;
      mc anonymous set download local/${MINIO_BUCKET_NAME:-turnos} || true;
      echo 'bucket listo';
      "
    networks:
      - net-shared

volumes:
  mysql_data:
  minio_data:

networks:
  net-shared:
    external: true
